name: DIAMANT Mitgliederliste

on:
  schedule:
    - cron: '0 7 * * *'   # täglich um 07:00 UTC
  workflow_dispatch:        # erlaubt manuelles Auslösen zum Testen

permissions:
  contents: write   # nötig, damit der Workflow data/ zurück ins Repo committen kann

jobs:
  member-list:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: DEBUG - Rollen und Bot-Berechtigungen prüfen
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_VERIFIED_ROLE_ID: ${{ secrets.DISCORD_VERIFIED_ROLE_ID }}
        run: |
          echo "--- Alle Rollen im Server (id, name, position, permissions) ---"
          curl -s -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            "https://discord.com/api/v10/guilds/$DISCORD_GUILD_ID/roles" \
            | python3 -c "import sys,json; [print(r['id'], '|', r['name'], '| pos:', r['position'], '| perms:', r['permissions']) for r in json.load(sys.stdin)]"
          echo ""
          echo "--- Bot selbst (eigene Rollen-IDs) ---"
          curl -s -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            "https://discord.com/api/v10/guilds/$DISCORD_GUILD_ID/members/@me"
          echo ""
          echo "--- Ziel-Rolle (DISCORD_VERIFIED_ROLE_ID) ---"
          echo "$DISCORD_VERIFIED_ROLE_ID"

      - name: Liste erstellen und posten
        env:
          SC_API_KEY: ${{ secrets.SC_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_MEMBERLIST_WEBHOOK_URL: ${{ secrets.DISCORD_MEMBERLIST_WEBHOOK_URL }}
          DISCORD_VERIFIED_ROLE_ID: ${{ secrets.DISCORD_VERIFIED_ROLE_ID }}
        run: python diamant_member_list.py

      - name: Ergebnisse ins Repo zurückschreiben
        run: |
          git config user.name "diamant-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state.json data/members.csv
          git diff --staged --quiet || git commit -m "Mitgliederliste aktualisiert"
          git push
