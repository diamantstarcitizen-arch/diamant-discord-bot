name: DIAMANT Mitgliederzähler

on:
  schedule:
    - cron: '0 * * * *'   # jede volle Stunde (UTC)
  workflow_dispatch:        # erlaubt manuelles Auslösen zum Testen

jobs:
  update-channel:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: DEBUG - Server und Kanal-Info abrufen
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          echo "--- Server, in denen der Bot Mitglied ist ---"
          curl -s -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            "https://discord.com/api/v10/users/@me/guilds"
          echo ""
          echo "--- Direkte Abfrage der Channel-ID ---"
          curl -s -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID"

      - name: Skript ausführen
        env:
          SC_API_KEY: ${{ secrets.SC_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python diamant_member_count.py
